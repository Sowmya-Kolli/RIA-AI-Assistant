<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RIA Language Selection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Inter font for modern, readable typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons for UI elements -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg: #0F0F0F;
            --primary: #F1F1F1;
            --secondary: #A1A1AA;
            --accent: #6366F1;
            --accent2: #22D3EE;
            --tile-bg: #121212;
            --tile-hover-bg: #1E1E1E;
            --tile-border: rgba(255,255,255,0.1);
            --tile-selected-border: #22D3EE;
            --circle-bg: #23234a;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body {
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            max-width: 720px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
        }
        .logo {
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 0.15em;
            color: var(--accent2);
            user-select: none;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--primary);
            margin: 0;
        }
        .subtitle {
            font-weight: 400;
            font-size: 1rem;
            color: var(--secondary);
            margin-bottom: 2rem;
            max-width: 480px;
        }
        /* Language grid container */
        .language-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.25rem;
            width: 100%;
            margin-bottom: 3rem;
        }
        /* Language tile */
        .language-tile {
            background-color: var(--tile-bg);
            border-radius: 20px;
            padding: 1.5rem 1rem;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            user-select: none;
            outline: none;
            height: 180px;
            box-sizing: border-box;
            position: relative;
        }
        .language-tile:hover,
        .language-tile:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent2);
            outline: none;
        }
        .language-tile.selected {
            border-color: var(--tile-selected-border);
            box-shadow: 0 0 18px var(--tile-selected-border);
            font-weight: 700;
        }
        .lang-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--circle-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent2);
            margin-bottom: 1.1rem;
            letter-spacing: 0.04em;
            transition: background 0.2s;
        }
        .language-tile.selected .lang-circle {
            background: var(--accent2);
            color: #fff;
        }
        .language-name {
            font-size: 1.22rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.18rem;
        }
        .language-code {
            font-size: 1rem;
            font-weight: 500;
            color: var(--secondary);
            user-select: none;
            letter-spacing: 0.06em;
        }
        /* Checkmark for selected */
        .tile-check {
            position: absolute;
            top: 12px;
            right: 18px;
            color: var(--accent2);
            font-size: 1.3rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .language-tile.selected .tile-check {
            opacity: 1;
        }
        /* Continue button container */
        .continue-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 1rem;
        }
        button.continue-btn {
            background-color: var(--accent2);
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 0.85rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: not-allowed;
            opacity: 0.5;
            transition: background-color 0.3s ease, opacity 0.3s ease;
            user-select: none;
            outline: none;
        }
        button.continue-btn.enabled {
            cursor: pointer;
            opacity: 1;
            background-color: var(--accent);
        }
        button.continue-btn:focus {
            outline: 2px solid var(--accent2);
            outline-offset: 2px;
        }
        /* Responsive adjustments */
        @media (max-width: 480px) {
            .language-tile {
                height: 140px;
                padding: 1rem 0.75rem;
            }
            .lang-circle {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
                margin-bottom: 0.7rem;
            }
            .language-name {
                font-size: 1.05rem;
            }
            .language-code {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <main class="container" role="main" aria-label="Language Selection">
        <div class="logo" aria-label="RIA logo">RIA</div>
        <h1 id="page-title">Choose Your Language</h1>
        <p class="subtitle" id="page-subtitle">RIA supports your native voice. Select one to begin.</p>
        <div class="language-grid" role="list" aria-labelledby="page-title">
            <!-- Language tiles inserted by JS -->
        </div>
        <div class="continue-container">
            <button type="button" class="continue-btn" id="continueBtn" aria-disabled="true" aria-live="polite">Continue</button>
        </div>
    </main>
    <audio id="langAudio" src="../audio/language.mp3" preload="auto"></audio>
    <script>
        // Language data
        const languages = [
            { name: 'English', code: 'EN', color: '#6366F1', greet: null, locale: 'en' },
            { name: 'Hindi', code: 'HI', color: '#22D3EE', greet: null, locale: 'hi' },
            { name: 'Tamil', code: 'TA', color: '#F59E42', greet: null, locale: 'ta' },
            { name: 'Telugu', code: 'TE', color: '#F43F5E', greet: null, locale: 'te' },
            { name: 'Kannada', code: 'KN', color: '#10B981', greet: null, locale: 'kn' },
            { name: 'Bengali', code: 'BN', color: '#FBBF24', greet: null, locale: 'bn' },
            { name: 'Malayalam', code: 'ML', color: '#A21CAF', greet: null, locale: 'ml' }
        ];

        const languageGrid = document.querySelector('.language-grid');
        const continueBtn = document.getElementById('continueBtn');
        const subtitle = document.getElementById('page-subtitle');
        let selectedLanguageIndex = null;

        // Prompts for translation (OpenAI)
        const translationPrompts = {
            'EN': "Translate this sentence to English: I will speak in your selected language.",
            'HI': "इस वाक्य का हिंदी में अनुवाद करें: I will speak in your selected language.",
            'TA': "இந்த வாக்கியத்தை தமிழில் மொழிபெயர்க்கவும்: I will speak in your selected language.",
            'TE': "ఈ వాక్యాన్ని తెలుగులో అనువదించండి: I will speak in your selected language.",
            'KN': "ಈ ವಾಕ್ಯವನ್ನು ಕನ್ನಡಕ್ಕೆ ಅನುವಾದಿಸಿ: I will speak in your selected language.",
            'BN': "এই বাক্যটি বাংলায় অনুবাদ করুন: I will speak in your selected language.",
            'ML': "ഈ വാക്യം മലയാളത്തിലേക്ക് വിവർത്തനം ചെയ്യുക: I will speak in your selected language."
        };

        // Helper: OpenAI API call for translation
        async function fetchOpenAITranslation(lang) {
            try {
            let apiKey = "";
            try {
                const configRes = await fetch("http://localhost:3000/api/config");
                const config = await configRes.json();
                apiKey = config.OPENAI_API_KEY;
            } catch (err) {
                console.error("Failed to load OpenAI API key from backend:", err);
            }
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [
                    { role: "system", content: "You are a helpful assistant that translates sentences." },
                    { role: "user", content: translationPrompts[lang] }
                ],
                max_tokens: 60,
                temperature: 0.3
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content.trim().replace(/^["']|["']$/g, "");
            }
            } catch (e) {
            return null;
            }
            return null;
        }

        // Create language tiles
        languages.forEach((lang, index) => {
            const tile = document.createElement('button');
            tile.className = 'language-tile';
            tile.setAttribute('role', 'listitem');
            tile.setAttribute('aria-label', `Language option: ${lang.name}`);
            tile.setAttribute('tabindex', '0');
            tile.type = 'button';

            tile.innerHTML = `
            <div class="lang-circle" style="background:${lang.color}22;color:${lang.color}">${lang.code}</div>
            <div class="language-name">${lang.name}</div>
            <div class="language-code">${lang.code}</div>
            <span class="tile-check" aria-hidden="true"><i class="bi bi-check-circle-fill"></i></span>
            `;

            tile.addEventListener('click', () => {
            selectLanguage(index);
            });

            tile.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                selectLanguage(index);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                const nextIndex = (index + 1) % languages.length;
                languageGrid.children[nextIndex].focus();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                const prevIndex = (index - 1 + languages.length) % languages.length;
                languageGrid.children[prevIndex].focus();
            }
            });

            languageGrid.appendChild(tile);
        });

        async function selectLanguage(index) {
            if (selectedLanguageIndex !== null) {
            languageGrid.children[selectedLanguageIndex].classList.remove('selected');
            }
            selectedLanguageIndex = index;
            languageGrid.children[selectedLanguageIndex].classList.add('selected');
            continueBtn.disabled = false;
            continueBtn.setAttribute('aria-disabled', 'false');
            continueBtn.classList.add('enabled');
            continueBtn.textContent = `Start with ${languages[selectedLanguageIndex].name}`;
            // Save selection to sessionStorage
            sessionStorage.setItem('selectedLanguage', JSON.stringify(languages[selectedLanguageIndex]));

            // Greeting logic: translate "I will speak in your selected language."
            const lang = languages[selectedLanguageIndex];
            subtitle.textContent = "Loading greeting...";
            let greeting = lang.greet;
            if (!greeting) {
            greeting = await fetchOpenAITranslation(lang.code);
            if (!greeting) greeting = "I will speak in your selected language.";
            }
            subtitle.textContent = greeting;
        }

        continueBtn.addEventListener('click', () => {
            if (selectedLanguageIndex === null || continueBtn.disabled) return;
            window.location.href = 'home.html';
        });

        // Restore selection if exists
        window.addEventListener('load', () => {
            const savedLang = sessionStorage.getItem('selectedLanguage');
            if (savedLang) {
            const langObj = JSON.parse(savedLang);
            const idx = languages.findIndex(l => l.code === langObj.code);
            if (idx !== -1) {
                selectLanguage(idx);
            }
            }
        });

        // Play audio on mouse click (once per reload)
        let audioPlayed = false;
        document.addEventListener('click', function playLangAudioOnce() {
            if (!audioPlayed) {
                const audio = document.getElementById('langAudio');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play();
                }
                audioPlayed = true;
            }
        }, { once: true });
    </script>
</body>
</html>
