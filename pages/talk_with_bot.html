<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Gemini Voice Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts and Bootstrap Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- SiriWave -->
    <script src="https://unpkg.com/siriwave/dist/siriwave.umd.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Poppins', Arial, sans-serif;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            min-width: 100vw;
            display: flex;
            flex-direction: row;
            background: #000;
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: #181a20;
            color: #fff;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 16px #0008;
            padding: 0 0 24px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 24px 12px 24px;
            font-size: 1.4rem;
            font-weight: 700;
            border-bottom: 1px solid #23242a;
            letter-spacing: 0.02em;
        }

        .conversation-list {
            flex: 1;
            padding: 18px 18px 0 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .conv-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            animation: fadeInMsg 0.45s cubic-bezier(.4, 2, .6, 1) both;
        }

        @keyframes fadeInMsg {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .conv-user {
            align-self: flex-end;
            background: linear-gradient(90deg, #66e8ff 0%, #4b3ff7 100%);
            color: #181818;
            border-radius: 16px 16px 4px 16px;
            padding: 10px 18px;
            max-width: 82%;
            font-size: 1.05rem;
            box-shadow: 0 2px 8px #0002;
            font-weight: 500;
            border: 1px solid #eee7;
            text-align: left;
        }

        .conv-bot {
            align-self: flex-start;
            background: linear-gradient(90deg, #caff70 0%, #ffb347 100%);
            color: #181818;
            border-radius: 16px 16px 16px 4px;
            padding: 10px 18px;
            max-width: 82%;
            font-size: 1.05rem;
            box-shadow: 0 2px 8px #0002;
            font-weight: 500;
            border: 1px solid #eee7;
            text-align: left;
        }

        /* Main Center */
        .main-center {
            flex: 1;
            min-width: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .center-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Bot response bubble */
        .bot-response {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
            z-index: 30;
            position: relative;
            width: 100%;
        }

        .bubble {
            background: linear-gradient(90deg, #ffe066 0%, #caff70 60%, #ffb347 100%);
            color: #181818;
            border-radius: 18px;
            padding: 18px 32px;
            font-size: 1.16rem;
            font-family: 'Poppins', Arial, sans-serif;
            font-weight: 500;
            box-shadow: 0 4px 32px 0 rgba(255, 224, 102, 0.11);
            border: 2px solid #fff3;
            min-height: 38px;
            min-width: 120px;
            letter-spacing: 0.01em;
            animation: fadeInBubble 0.6s cubic-bezier(.4, 2, .6, 1) both;
            text-align: center;
            max-width: 580px;
            margin: 0 auto;
        }

        @keyframes fadeInBubble {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Typewriter effect */
        .typewriter {
            display: inline-block;
            overflow: hidden;
            border-right: .13em solid #181818;
            white-space: nowrap;
            animation: typing 2.4s steps(30, end), blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes blink-caret {

            from,
            to {
                border-color: transparent
            }

            50% {
                border-color: #181818;
            }
        }

        /* OVAL GLOW ANIMATION (yellow, lime, orange) */
        .oval-holder {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 0 auto;
            z-index: 2;
        }

        .square {
            position: absolute;
            width: 400px;
            height: 400px;
            left: 0;
            top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            pointer-events: none;
        }

        .square span:nth-child(1) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00ffc000 50%, #06ffe23b 40%);
            box-shadow: 0 0 50px #00e0c6, inset 0 0 50px #00e0c6;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate1 6s linear infinite;
        }

        .square span:nth-child(2) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#ff00c000 50%, #fd10e13b 40%);
            box-shadow: 0 0 50px #f317d9, inset 0 0 50px #f927e0;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate2 4s linear infinite;
        }

        .square span:nth-child(3) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00aaff06 50%, #00e1ff3b 40%);
            box-shadow: 0 0 50px #00ddff, inset 0 0 50px #00fbff;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate3 8s linear infinite;
        }

        @keyframes animate1 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes animate2 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes animate3 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Particle sphere */
        .oval-center {
            position: relative;
            width: 260px;
            height: 260px;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.763);
            z-index: 5;
            overflow: visible;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvasOne {
            position: absolute;
            left: 0;
            top: 0;
            width: 260px;
            height: 260px;
            pointer-events: none;
            z-index: 10;
            display: block;
        }

        /* SiriWave */
        #siri-container {
            width: 400px;
            height: 80px;
            margin: 0 auto;
            margin-bottom: 24px;
            display: none;
            background: transparent;
            z-index: 10;
        }

        /* Mic Button */
        .mic-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 18px;
        }

        .mic-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #181818;
            border: none;
            color: #fff;
            box-shadow: 0 0 0 0 #ffe066, 0 0 28px 12px #ffe06655;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            transition: box-shadow 0.2s, background 0.2s;
            position: relative;
            cursor: pointer;
            outline: none;
            margin-top: 30px;
            z-index: 10;
        }

        .mic-btn:active,
        .mic-btn:focus {
            box-shadow: 0 0 60px 20px #ffe06699, 0 0 80px 30px #caff7099;
            background: #222;
            outline: none;
        }

        .prompt-text {
            margin-top: 18px;
            color: #fff;
            font-size: 1.18rem;
            letter-spacing: 0.01em;
            opacity: 0.95;
            text-align: center;
            font-family: 'Poppins', Arial, sans-serif;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 120px;
                font-size: 0.9rem;
            }

            .sidebar-header {
                font-size: 1.1rem;
                padding: 14px 8px 8px 8px;
            }

            #siri-container {
                width: 98vw;
            }

            .oval-holder,
            .square {
                width: 90vw !important;
                height: 90vw !important;
                max-width: 400px;
                max-height: 400px;
            }

            .oval-center,
            #canvasOne {
                width: 40vw !important;
                height: 40vw !important;
                min-width: 120px;
                min-height: 120px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                display: none;
            }

            .main-center {
                width: 100vw;
            }

            .oval-holder,
            #siri-container {
                width: 95vw !important;
            }

            .oval-holder,
            .square {
                height: 60vw !important;
                min-height: 220px;
            }

            .oval-center,
            #canvasOne {
                width: 40vw !important;
                height: 40vw !important;
                min-width: 120px;
                min-height: 120px;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar for conversation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Conversation</div>
        <div class="conversation-list" id="conversationList">
            <!-- Conversation items will be appended here -->
        </div>
    </div>
    <!-- Main Center -->
    <div class="main-center">
        <div class="center-stack">
            <!-- Bot response bubble (centered) -->
            <div class="bot-response" id="botResponse" style="display:flex;">
                <div class="bubble">
                    <span class="typewriter" id="typewriterText">Hello! How can I assist you today?</span>
                </div>
            </div>
            <!-- OVAL + PARTICLES (centered) -->
            <div class="oval-holder">
                <div class="square">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="oval-center">
                    <canvas id="canvasOne" width="260" height="260"></canvas>
                </div>
            </div>
            <!-- SiriWave (between sphere and mic) -->
            <div id="siri-container"></div>
            <!-- Mic Button -->
            <div class="mic-stack">
                <button id="MicBtn" class="mic-btn" aria-label="Speak">
                    <i class="bi bi-mic"></i>
                </button>
                <div class="prompt-text" id="promptText">Tap the mic and speak</div>
            </div>
        </div>
    </div>
    <!-- Play intro audio once per page reload -->
    <audio id="introAudio" src="../audio/talk.mp3"></audio>
    <script>
        // Play intro audio once per page reload
        window.addEventListener('DOMContentLoaded', function () {
            const audio = document.getElementById('introAudio');
            if (audio) {
                audio.play().catch(() => { }); // ignore autoplay errors
            }
        });
    </script>
    <script>
        // Conversation history
        let conversation = [
            { role: "bot", text: "Hello! How can I assist you today?" }
        ];

        // Sidebar rendering
        function renderConversation() {
            const list = document.getElementById("conversationList");
            list.innerHTML = '';
            conversation.forEach(item => {
                const div = document.createElement('div');
                div.className = 'conv-item';
                const bubble = document.createElement('div');
                bubble.className = item.role === 'user' ? 'conv-user' : 'conv-bot';
                bubble.textContent = item.text;
                div.appendChild(bubble);
                list.appendChild(div);
            });
            // Scroll to bottom
            list.scrollTop = list.scrollHeight;
        }
        renderConversation();

        // Typewriter effect
        function typeWriterEffect(element, text, speed = 18, callback) {
            element.textContent = '';
            let i = 0;
            function typing() {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                    setTimeout(typing, speed);
                } else if (callback) {
                    callback();
                }
            }
            typing();
        }

        // SiriWave setup
        let siriWave;
        function initSiriWave() {
            if (siriWave) return;
            siriWave = new SiriWave({
                container: document.getElementById("siri-container"),
                width: 400,
                height: 80,
                style: 'ios9',
                speed: 0.18,
                amplitude: 1.5,
                autostart: false,
                cover: true,
                curveDefinition: [
                    { color: "255,255,255", supportLine: true },
                    { color: "15, 82, 169" }, // blue
                    { color: "173, 57, 76" }, // red
                    { color: "48, 220, 155" }, // green
                ]
            });
        }
        function showSiriWave() {
            document.getElementById("siri-container").style.display = "block";
            initSiriWave();
            siriWave.setAmplitude(1.5);
            siriWave.start();
        }
        function hideSiriWave() {
            if (siriWave) siriWave.stop();
            document.getElementById("siri-container").style.display = "none";
        }

        // Speech-to-text using Web Speech API (max 7 seconds)
        function startRecognition() {
            hideSiriWave();
            const promptText = document.getElementById("promptText");
            promptText.textContent = "Listening...";
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                promptText.textContent = "Speech recognition not supported in this browser.";
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            let recognitionEnded = false;
            let timer = setTimeout(() => {
                if (!recognitionEnded) {
                    recognition.stop();
                }
            }, 7000); // 7 seconds

            recognition.onresult = function (event) {
                recognitionEnded = true;
                clearTimeout(timer);
                const transcript = event.results[0][0].transcript;
                promptText.textContent = "Processing...";
                addToConversation('user', transcript);
                sendToGroq(transcript);
            };
            recognition.onerror = function (event) {
                recognitionEnded = true;
                clearTimeout(timer);
                promptText.textContent = "Error: " + event.error;
                showSiriWave();
            };
            recognition.onend = function () {
                if (!recognitionEnded) {
                    promptText.textContent = "No input detected. Tap the mic and speak.";
                    showSiriWave();
                }
            };
            recognition.start();
        }

        // Add message to conversation and re-render
        function addToConversation(role, text) {
            conversation.push({ role, text });
            renderConversation();
        }

        // Send user prompt to Groq API
        async function sendToGroq(prompt) {
            let apiKey = "";
            try {
                const configRes = await fetch("http://localhost:3000/api/config");
                const config = await configRes.json();
                apiKey = config.GROQ_API_KEY;
            } catch (err) {
                console.error("Failed to load Groq API key from backend:", err);
            }
            const url = "https://api.groq.com/openai/v1/chat/completions";
            const botResponseElem = document.getElementById("typewriterText");
            document.getElementById("botResponse").style.display = "flex";
            showSiriWave();

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are RIA, a helpful, witty, and advanced AI voice assistant. Keep your responses concise and conversational." },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await res.json();
                let botText = "Sorry, I couldn't understand.";

                if (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                    botText = data.choices[0].message.content;
                } else {
                    console.error("Groq API Error:", data);
                    botText = "I'm having trouble connecting to my servers.";
                }

                botResponseElem.textContent = '';
                botResponseElem.classList.remove('typewriter');
                void botResponseElem.offsetWidth;
                botResponseElem.classList.add('typewriter');

                typeWriterEffect(botResponseElem, botText, 18);
                addToConversation('bot', botText);
                document.getElementById("promptText").textContent = "Tap the mic and speak";
                speakBotResponse(botText);
            } catch (e) {
                console.error(e);
                botResponseElem.textContent = "Error contacting Groq API.";
                addToConversation('bot', "Error contacting Groq API.");
                document.getElementById("promptText").textContent = "Tap the mic and speak";
            }
            showSiriWave();
        }

        // Text-to-Speech for bot response - FEMALE VOICE SELECTION
        function speakBotResponse(text) {
            if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = "en-US";
                utter.rate = 1.04;
                utter.pitch = 1.0;
                utter.volume = 1.0;

                // Try to select a female voice
                function setFemaleVoice() {
                    const voices = window.speechSynthesis.getVoices();
                    // Look for typical female voices
                    let femaleVoice = voices.find(v =>
                        (v.name && v.name.toLowerCase().includes('female')) ||
                        (v.voiceURI && v.voiceURI.toLowerCase().includes('female')) ||
                        (v.name && ['susan', 'samantha', 'karen', 'victoria', 'zira', 'luciana', 'francesca', 'alice', 'fiona', 'emma', 'julie', 'linda', 'eva', 'joanna', 'mia', 'tessa', 'en-us-arial'].some(f => v.name.toLowerCase().includes(f)))
                    );
                    // Fallback: pick the first voice with 'female' in the name, or just the first voice
                    if (!femaleVoice && voices.length > 0) {
                        femaleVoice = voices.find(v => v.name && v.name.toLowerCase().includes('female')) || voices[0];
                    }
                    if (femaleVoice) {
                        utter.voice = femaleVoice;
                    }
                    window.speechSynthesis.speak(utter);
                }
                // Some browsers load voices asynchronously
                const voices = window.speechSynthesis.getVoices();
                if (voices.length) {
                    setFemaleVoice();
                } else {
                    window.speechSynthesis.onvoiceschanged = setFemaleVoice;
                }
            }
        }

        // Mic button event
        document.getElementById("MicBtn").addEventListener("click", function () {
            startRecognition();
        });

        // --- Particle Sphere (canvas) ---
        // From paste.txt
        window.addEventListener("load", windowLoadHandler, false);
        var sphereRad = 140;
        var radius_sp = 1;
        var Debugger = function () { };
        Debugger.log = function (message) {
            try { console.log(message); } catch (exception) { return; }
        }
        function windowLoadHandler() {
            canvasApp();
        }
        function canvasSupport() {
            return !!document.createElement('canvas').getContext;
        }
        function canvasApp() {
            if (!canvasSupport()) return;
            var theCanvas = document.getElementById("canvasOne");
            var context = theCanvas.getContext("2d");
            var displayWidth, displayHeight, timer, wait, count, numToAddEachFrame;
            var particleList, recycleBin, particleAlpha, r, g, b, fLen, m, projCenterX, projCenterY, zMax, turnAngle, turnSpeed;
            var sphereCenterX, sphereCenterY, sphereCenterZ, particleRad, zeroAlphaDepth, randAccelX, randAccelY, randAccelZ, gravity, rgbString;
            var p, outsideTest, nextParticle, sinAngle, cosAngle, rotX, rotZ, depthAlphaFactor, i, theta, phi, x0, y0, z0;
            init();
            function init() {
                wait = 1;
                count = wait - 1;
                numToAddEachFrame = 8;
                r = 0; g = 72; b = 255;
                rgbString = "rgba(" + r + "," + g + "," + b + ",";
                particleAlpha = 1;
                displayWidth = theCanvas.width;
                displayHeight = theCanvas.height;
                fLen = 320;
                projCenterX = displayWidth / 2;
                projCenterY = displayHeight / 2;
                zMax = fLen - 2;
                particleList = {};
                recycleBin = {};
                randAccelX = 0.1;
                randAccelY = 0.1;
                randAccelZ = 0.1;
                gravity = -0;
                particleRad = 1.8;
                sphereCenterX = 0;
                sphereCenterY = 0;
                sphereCenterZ = -3 - sphereRad;
                zeroAlphaDepth = -750;
                turnSpeed = 2 * Math.PI / 1200;
                turnAngle = 0;
                timer = setInterval(onTimer, 10 / 24);
            }
            function onTimer() {
                count++;
                if (count >= wait) {
                    count = 0;
                    for (i = 0; i < numToAddEachFrame; i++) {
                        theta = Math.random() * 2 * Math.PI;
                        phi = Math.acos(Math.random() * 2 - 1);
                        x0 = sphereRad * Math.sin(phi) * Math.cos(theta);
                        y0 = sphereRad * Math.sin(phi) * Math.sin(theta);
                        z0 = sphereRad * Math.cos(phi);
                        var p = addParticle(x0, sphereCenterY + y0, sphereCenterZ + z0, 0.002 * x0, 0.002 * y0, 0.002 * z0);
                        p.attack = 50;
                        p.hold = 50;
                        p.decay = 100;
                        p.initValue = 0;
                        p.holdValue = particleAlpha;
                        p.lastValue = 0;
                        p.stuckTime = 90 + Math.random() * 20;
                        p.accelX = 0;
                        p.accelY = gravity;
                        p.accelZ = 0;
                    }
                }
                turnAngle = (turnAngle + turnSpeed) % (2 * Math.PI);
                sinAngle = Math.sin(turnAngle);
                cosAngle = Math.cos(turnAngle);
                context.clearRect(0, 0, displayWidth, displayHeight);
                p = particleList.first;
                while (p != null) {
                    nextParticle = p.next;
                    p.age++;
                    if (p.age > p.stuckTime) {
                        p.velX += p.accelX + randAccelX * (Math.random() * 2 - 1);
                        p.velY += p.accelY + randAccelY * (Math.random() * 2 - 1);
                        p.velZ += p.accelZ + randAccelZ * (Math.random() * 2 - 1);
                        p.x += p.velX;
                        p.y += p.velY;
                        p.z += p.velZ;
                    }
                    rotX = cosAngle * p.x + sinAngle * (p.z - sphereCenterZ);
                    rotZ = -sinAngle * p.x + cosAngle * (p.z - sphereCenterZ) + sphereCenterZ;
                    m = radius_sp * fLen / (fLen - rotZ);
                    p.projX = rotX * m + projCenterX;
                    p.projY = p.y * m + projCenterY;
                    if (p.age < p.attack + p.hold + p.decay) {
                        if (p.age < p.attack) {
                            p.alpha = (p.holdValue - p.initValue) / p.attack * p.age + p.initValue;
                        }
                        else if (p.age < p.attack + p.hold) {
                            p.alpha = p.holdValue;
                        }
                        else if (p.age < p.attack + p.hold + p.decay) {
                            p.alpha = (p.lastValue - p.holdValue) / p.decay * (p.age - p.attack - p.hold) + p.holdValue;
                        }
                    }
                    else {
                        p.dead = true;
                    }
                    if ((p.projX > displayWidth) || (p.projX < 0) || (p.projY < 0) || (p.projY > displayHeight) || (rotZ > zMax)) {
                        outsideTest = true;
                    }
                    else {
                        outsideTest = false;
                    }
                    if (outsideTest || p.dead) {
                        recycle(p);
                    }
                    else {
                        depthAlphaFactor = (1 - rotZ / zeroAlphaDepth);
                        depthAlphaFactor = (depthAlphaFactor > 1) ? 1 : ((depthAlphaFactor < 0) ? 0 : depthAlphaFactor);
                        context.fillStyle = rgbString + depthAlphaFactor * p.alpha + ")";
                        context.beginPath();
                        context.arc(p.projX, p.projY, m * particleRad, 0, 2 * Math.PI, false);
                        context.closePath();
                        context.fill();
                    }
                    p = nextParticle;
                }
            }
            function addParticle(x0, y0, z0, vx0, vy0, vz0) {
                var newParticle;
                if (recycleBin.first != null) {
                    newParticle = recycleBin.first;
                    if (newParticle.next != null) {
                        recycleBin.first = newParticle.next;
                        newParticle.next.prev = null;
                    }
                    else {
                        recycleBin.first = null;
                    }
                }
                else {
                    newParticle = {};
                }
                if (particleList.first == null) {
                    particleList.first = newParticle;
                    newParticle.prev = null;
                    newParticle.next = null;
                }
                else {
                    newParticle.next = particleList.first;
                    particleList.first.prev = newParticle;
                    particleList.first = newParticle;
                    newParticle.prev = null;
                }
                newParticle.x = x0;
                newParticle.y = y0;
                newParticle.z = z0;
                newParticle.velX = vx0;
                newParticle.velY = vy0;
                newParticle.velZ = vz0;
                newParticle.age = 0;
                newParticle.dead = false;
                if (Math.random() < 0.5) {
                    newParticle.right = true;
                }
                else {
                    newParticle.right = false;
                }
                return newParticle;
            }
            function recycle(p) {
                if (particleList.first == p) {
                    if (p.next != null) {
                        p.next.prev = null;
                        particleList.first = p.next;
                    }
                    else {
                        particleList.first = null;
                    }
                }
                else {
                    if (p.next == null) {
                        p.prev.next = null;
                    }
                    else {
                        p.prev.next = p.next;
                        p.next.prev = p.prev;
                    }
                }
                if (recycleBin.first == null) {
                    recycleBin.first = p;
                    p.prev = null;
                    p.next = null;
                }
                else {
                    p.next = recycleBin.first;
                    recycleBin.first.prev = p;
                    recycleBin.first = p;
                    p.prev = null;
                }
            }
        }
