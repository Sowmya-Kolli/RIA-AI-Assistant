<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RIA – Search by Image</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Inter font for clean, modern look -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap Icons for icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --bg: #0F0F0F;
      --card: #1A1A1A;
      --border: rgba(255,255,255,0.05);
      --primary: #F1F1F1;
      --secondary: #A1A1AA;
      --accent1: #6366F1;
      --accent2: #22D3EE;
      --accent-gradient: linear-gradient(90deg, #6366F1 0%, #22D3EE 100%);
      --danger: #ff4d4f;
      --shadow: 0 4px 32px 0 rgba(34,211,238,0.08);
    }
    html, body {
      background: var(--bg);
      color: var(--primary);
      font-family: 'Inter', 'SF Pro', 'Roboto', Arial, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      padding: 32px 0 24px 0;
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }
    .logo {
      font-weight: 700;
      font-size: 2rem;
      color: var(--accent2);
      letter-spacing: 0.13em;
      margin-right: 28px;
      user-select: none;
    }
    .back-home {
      color: var(--secondary);
      font-size: 1.7rem;
      margin-right: 18px;
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s;
    }
    .back-home:hover {
      color: var(--accent2);
    }
    .page-title {
      font-size: 2rem;
      font-weight: 600;
      color: var(--primary);
      flex: 1;
      letter-spacing: 0.01em;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px 32px 32px 32px;
      margin: 0 auto;
      margin-top: 16px;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.2s;
    }
    .upload-area {
      width: 100%;
      min-height: 160px;
      border: 2px dashed var(--border);
      border-radius: 18px;
      background: #18181a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
      outline: none;
    }
    .upload-area.dragover, .upload-area:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px var(--accent2);
    }
    .upload-icon {
      font-size: 2.5rem;
      color: var(--accent1);
      margin-bottom: 10px;
    }
    .upload-text {
      color: var(--secondary);
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .upload-btn {
      margin-top: 10px;
      padding: 0.7em 1.6em;
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 12px 0 rgba(34,211,238,0.08);
      cursor: pointer;
      transition: transform 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-btn:active {
      transform: scale(0.97);
    }
    .capture-btn {
      margin-top: 16px;
      padding: 0.7em 1.6em;
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 12px 0 rgba(99,102,241,0.07);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.12s;
    }
    .capture-btn:active {
      transform: scale(0.97);
    }
    .preview-section {
      margin: 26px 0 10px 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.2s;
    }
    .image-preview {
      width: 220px;
      height: 220px;
      object-fit: contain;
      border-radius: 16px;
      background: #19191b;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      box-shadow: 0 2px 16px 0 rgba(99,102,241,0.09);
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    .image-preview:active {
      box-shadow: 0 0 0 4px var(--accent2);
    }
    .analyze-btn {
      margin-top: 8px;
      padding: 0.7em 1.7em;
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 2px 12px 0 rgba(99,102,241,0.09);
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .analyze-btn:active {
      transform: scale(0.97);
    }
    .analyze-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .loading-spinner {
      border: 3px solid #222;
      border-top: 3px solid var(--accent2);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    .result-section {
      margin: 36px 0 0 0;
      width: 100%;
      background: none;
      border-radius: 10px;
      animation: fadeIn 0.6s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .result-title {
      font-size: 1.18rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary);
    }
    .result-text {
      font-size: 1.13rem;
      color: var(--secondary);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .audio-btn {
      background: none;
      border: none;
      color: var(--accent2);
      font-size: 1.8rem;
      cursor: pointer;
      margin-left: 8px;
      vertical-align: middle;
      transition: color 0.2s;
    }
    .audio-btn:active { color: var(--accent1);}
    .translated-section {
      margin-top: 10px;
      color: var(--primary);
      font-size: 1.08rem;
      background: #232334;
      border-radius: 7px;
      padding: 8px 14px;
      display: inline-block;
      line-height: 1.5;
    }
    .error-message {
      color: var(--danger);
      background: #1e1212;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 20px;
      font-size: 1.07rem;
      text-align: center;
    }
    footer {
      margin-top: 40px;
      width: 100%;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 32px;
    }
    .footer-divider {
      width: 100%;
      border-top: 1px solid var(--border);
      margin-bottom: 18px;
    }
    .footer-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 16px;
    }
    .footer-btn {
      flex: 1 1 0;
      padding: 0.7em 0;
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 2px 12px 0 rgba(99,102,241,0.07);
      margin: 0 2px;
      transition: transform 0.12s;
    }
    .footer-btn:active {
      transform: scale(0.97);
    }
    @media (max-width: 600px) {
      header, .card, footer {
        max-width: 98vw;
        padding-left: 8px;
        padding-right: 8px;
      }
      .card {
        padding: 22px 6vw 22px 6vw;
      }
      .oval-holder, #siri-container { width: 95vw !important; }
    }
    /* Accessibility focus */
    .upload-area:focus, .upload-btn:focus, .capture-btn:focus, .analyze-btn:focus, .footer-btn:focus {
      outline: 2px solid var(--accent2);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <header>
    <button class="back-home" aria-label="Return Home" onclick="window.location.href='home.html'"><i class="bi bi-arrow-left"></i></button>
    <div class="logo" aria-label="RIA Logo">RIA</div>
    <span class="page-title">Search by Image</span>
  </header>
  <main>
    <div class="card" role="main" aria-label="Image Search Card">
      <!-- Upload/Drag-and-Drop Section -->
      <div id="uploadArea" class="upload-area" tabindex="0" aria-label="Upload Image" aria-describedby="uploadDesc">
        <span class="upload-icon"><i class="bi bi-upload"></i></span>
        <span class="upload-text" id="uploadDesc">Drag & drop an image here, or</span>
        <button class="upload-btn" id="uploadBtn" type="button"><i class="bi bi-image"></i> Upload Image</button>
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp" style="display:none;" aria-label="Choose image file" />
      </div>
      <!-- Camera Capture Section -->
      <button class="capture-btn" id="cameraBtn" type="button"><i class="bi bi-camera-video"></i> Open Camera</button>
      <!-- Webcam Modal -->
      <div id="cameraModal" style="display:none; position:fixed; z-index:1000; top:0; left:0; width:100vw; height:100vh; background:rgba(15,15,15,0.92); align-items:center; justify-content:center;">
        <div style="background:#18181a; border-radius:18px; padding:26px 18px; box-shadow:0 0 0 100vmax rgba(0,0,0,0.3); display:flex; flex-direction:column; align-items:center; position:relative;">
          <video id="video" width="320" height="240" autoplay playsinline style="border-radius:12px; background:#111; margin-bottom:16px;"></video>
          <div style="display:flex; gap:12px;">
            <button id="capturePhotoBtn" class="analyze-btn" type="button"><i class="bi bi-camera"></i> Capture</button>
            <button id="closeCameraBtn" class="footer-btn" type="button" style="background:#232334;">Cancel</button>
          </div>
        </div>
      </div>
      <!-- Image Preview Section -->
      <div class="preview-section" id="previewSection" style="display:none;">
        <img id="imagePreview" class="image-preview" alt="Selected image preview" tabindex="0" />
      </div>
      <!-- Analyze Button -->
      <button class="analyze-btn" id="analyzeBtn" type="button" disabled>
        <span id="analyzeBtnText">Analyze Image</span>
        <span id="analyzeSpinner" class="loading-spinner" style="display:none;"></span>
      </button>
      <!-- Result Section -->
      <div class="result-section" id="resultSection" style="display:none;">
        <div class="result-title">RIA's Interpretation</div>
        <div class="result-text" id="resultText"></div>
        <button class="audio-btn" id="playAudioBtn" aria-label="Play result aloud" style="display:none;"><i class="bi bi-volume-up-fill"></i></button>
        <div class="translated-section" id="translatedSection" style="display:none;"></div>
      </div>
      <!-- Error Section -->
      <div class="error-message" id="errorMessage" style="display:none;"></div>
    </div>
  </main>
  <footer>
    <div class="footer-divider"></div>
    <div class="footer-actions">
      <button class="footer-btn" id="tryAnotherBtn" type="button">Try Another Image</button>
      <button class="footer-btn" id="returnHomeBtn" type="button" style="background:#232334;">Return Home</button>
    </div>
  </footer>
  <script>
    // --- State Variables ---
    let selectedImageFile = null;
    let selectedImageDataURL = null;
    let cameraStream = null;
    let lastResultAudioUrl = null;
    let analyzing = false;

    // --- Elements ---
    const uploadArea = document.getElementById('uploadArea');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const cameraBtn = document.getElementById('cameraBtn');
    const cameraModal = document.getElementById('cameraModal');
    const video = document.getElementById('video');
    const capturePhotoBtn = document.getElementById('capturePhotoBtn');
    const closeCameraBtn = document.getElementById('closeCameraBtn');
    const previewSection = document.getElementById('previewSection');
    const imagePreview = document.getElementById('imagePreview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const analyzeBtnText = document.getElementById('analyzeBtnText');
    const analyzeSpinner = document.getElementById('analyzeSpinner');
    const resultSection = document.getElementById('resultSection');
    const resultText = document.getElementById('resultText');
    const translatedSection = document.getElementById('translatedSection');
    const playAudioBtn = document.getElementById('playAudioBtn');
    const errorMessage = document.getElementById('errorMessage');
    const tryAnotherBtn = document.getElementById('tryAnotherBtn');
    const returnHomeBtn = document.getElementById('returnHomeBtn');

    // --- Accessibility: Focus ring on upload area ---
    uploadArea.addEventListener('focus', () => uploadArea.classList.add('dragover'));
    uploadArea.addEventListener('blur', () => uploadArea.classList.remove('dragover'));

    // --- Drag & Drop Upload ---
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // --- File Upload Button ---
    uploadBtn.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('click', (e) => {
      if (e.target === uploadArea) fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files && e.target.files[0]) {
        handleFile(e.target.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError("Please select a valid image file.");
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        showError("File size exceeds 5MB limit.");
        return;
      }
      selectedImageFile = file;
      const reader = new FileReader();
      reader.onload = function(e) {
        selectedImageDataURL = e.target.result;
        showImagePreview(selectedImageDataURL);
      };
      reader.readAsDataURL(file);
      hideError();
    }

    // --- Camera Capture ---
    cameraBtn.addEventListener('click', async () => {
      cameraModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = cameraStream;
        video.play();
      } catch (err) {
        showError('Unable to access camera. Please allow permission.');
        closeCameraModal();
      }
    });
    closeCameraBtn.addEventListener('click', closeCameraModal);

    function closeCameraModal() {
      cameraModal.style.display = 'none';
      document.body.style.overflow = '';
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
    }

    capturePhotoBtn.addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        if (blob) {
          handleFile(new File([blob], "captured.png", { type: "image/png" }));
        }
      }, "image/png");
      closeCameraModal();
    });

    // --- Image Preview ---
    function showImagePreview(dataURL) {
      imagePreview.src = dataURL;
      previewSection.style.display = 'flex';
      analyzeBtn.disabled = false;
      resultSection.style.display = 'none';
      translatedSection.style.display = 'none';
      playAudioBtn.style.display = 'none';
      errorMessage.style.display = 'none';
    }
    imagePreview.addEventListener('click', () => {
      // Zoom modal for preview
      const modal = document.createElement('div');
      modal.style.position = 'fixed';
      modal.style.top = '0';
      modal.style.left = '0';
      modal.style.width = '100vw';
      modal.style.height = '100vh';
      modal.style.background = 'rgba(0,0,0,0.95)';
      modal.style.display = 'flex';
      modal.style.alignItems = 'center';
      modal.style.justifyContent = 'center';
      modal.style.zIndex = '2000';
      modal.innerHTML = `<img src="${imagePreview.src}" alt="Zoomed image" style="max-width:92vw; max-height:90vh; border-radius:20px; box-shadow:0 0 0 6px #232334;">`;
      modal.addEventListener('click', () => document.body.removeChild(modal));
      document.body.appendChild(modal);
    });

    // --- Analyze Image ---
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedImageFile || analyzing) return;
      analyzing = true;
      analyzeBtn.disabled = true;
      analyzeBtnText.style.display = 'none';
      analyzeSpinner.style.display = 'inline-block';
      resultSection.style.display = 'none';
      translatedSection.style.display = 'none';
      playAudioBtn.style.display = 'none';
      errorMessage.style.display = 'none';

      // Simulate API call (replace with your backend endpoint)
      setTimeout(() => {
        // Example result
        const result = "This is a product label for ‘XYZ’. Would you like me to translate it?";
        const translation = "यह 'XYZ' का उत्पाद लेबल है। क्या आप चाहेंगे कि मैं इसका अनुवाद करूं?";
        showResult(result, translation);
        analyzing = false;
        analyzeBtn.disabled = false;
        analyzeBtnText.style.display = 'inline';
        analyzeSpinner.style.display = 'none';
      }, 1800);
    });

    function showResult(result, translation) {
      resultText.textContent = result;
      resultSection.style.display = 'block';
      playAudioBtn.style.display = 'inline-block';
      if (translation) {
        translatedSection.style.display = 'block';
        translatedSection.textContent = translation;
      } else {
        translatedSection.style.display = 'none';
      }
    }

    // --- Audio Playback ---
    playAudioBtn.addEventListener('click', () => {
      // Simulate TTS (replace with your backend endpoint)
      const text = resultText.textContent;
      if (!text) return;
      // Example: Use ElevenLabs or browser TTS
      if ('speechSynthesis' in window) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 1;
        window.speechSynthesis.speak(utter);
      }
      // For production, fetch audio from backend and play via Audio()
    });

    // --- Error Handling ---
    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      resultSection.style.display = 'none';
      previewSection.style.display = selectedImageDataURL ? 'flex' : 'none';
    }
    function hideError() {
      errorMessage.style.display = 'none';
    }

    // --- Footer Actions ---
    tryAnotherBtn.addEventListener('click', () => {
      selectedImageFile = null;
      selectedImageDataURL = null;
      previewSection.style.display = 'none';
      resultSection.style.display = 'none';
      translatedSection.style.display = 'none';
      playAudioBtn.style.display = 'none';
      errorMessage.style.display = 'none';
      analyzeBtn.disabled = true;
      fileInput.value = '';
    });
    returnHomeBtn.addEventListener('click', () => window.location.href = 'home.html');

    // --- Accessibility: Keyboard nav for modal close ---
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape" && cameraModal.style.display === 'flex') {
        closeCameraModal();
      }
    });
  </script>
</body>
</html>
