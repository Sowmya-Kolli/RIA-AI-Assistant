    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar Chat Area */
        .chat-sidebar {
            width: 420px;
            min-width: 340px;
            max-width: 480px;
            background: #18191c;
            border-right: 1.5px solid #222;
            box-shadow: 2px 0 24px #000a;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
            z-index: 10;
        }

        .chat-header {
            padding: 24px 28px 12px 28px;
            border-bottom: 1px solid #222;
            color: #00e0c6;
            font-size: 1.5rem;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            background: #191b1c;
        }

        #chatDisplay {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 24px 18px 12px 18px;
            background: #232428;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .user-msg {
            margin-left: auto;
            background: linear-gradient(90deg, #0045ff 60%, #00e0c6 100%);
            color: #fff;
            padding: 10px 18px;
            border-radius: 18px 18px 4px 22px;
            max-width: 75%;
            box-shadow: 0 2px 8px #0045ff55;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 1.08rem;
            word-break: break-word;
        }

        .bot-msg {
            margin-right: auto;
            background: linear-gradient(90deg, #0dcaf014 80%, #00e0c622 100%);
            color: #fff;
            border: 1.5px solid #00e0c6;
            padding: 10px 18px;
            border-radius: 6px 18px 18px 22px;
            max-width: 75%;
            box-shadow: 0 2px 8px #00e0c655;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 1.08rem;
            word-break: break-word;
        }

        /* Chat Input Section */
        .chat-input-section {
            padding: 18px 18px 18px 18px;
            background: #18191c;
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #TextInput {
            background-color: #232428;
            border: 1.5px solid #00e0c6;
            box-shadow: 0 0 12px #00e0c655, 0 0 4px #f317d955;
            border-radius: 18px;
            color: white;
            padding: 4px 0px 4px 18px;
            display: flex;
            align-items: center;
        }

        .input-field {
            background-color: transparent;
            border: none;
            width: 95%;
            outline: none;
            color: white;
            font-family: 'Segoe UI', cursive;
            font-size: 1.08rem;
            padding: 8px 0;
        }

        .glow-on-hover {
            width: 36px;
            height: 36px;
            border: none;
            outline: none;
            color: #fff;
            background: #111;
            cursor: pointer;
            position: relative;
            z-index: 0;
            border-radius: 10px;
            padding: 0px;
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .glow-on-hover:before {
            content: '';
            background: linear-gradient(45deg, #00ff8c, #00bbff, #fffb00, #9500ff, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            position: absolute;
            top: -2px;
            left: -2px;
            background-size: 400%;
            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            animation: glowing 20s linear infinite;
            opacity: 0;
            transition: opacity .3s ease-in-out;
            border-radius: 10px;
        }

        .glow-on-hover:active {
            color: #181818a8
        }

        .glow-on-hover:active:after {
            background: transparent;
        }

        .glow-on-hover:hover:before {
            opacity: 1;
        }

        .glow-on-hover:after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #111;
            left: 0;
            top: 0;
            border-radius: 10px;
        }

        @keyframes glowing {
            0% {
                background-position: 0 0;
            }

            50% {
                background-position: 400% 0;
            }

            100% {
                background-position: 0 0;
            }
        }

        /* Main Content Area (right) */
        .main-content {
            flex: 1 1 auto;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        /* Centered Jarvis Hood and Canvas */
        .centered-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        .square {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .square span:nth-child(1) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00ffc000 50%, #06ffe23b 40%);
            box-shadow: 0 0 50px #00e0c6, inset 0 0 50px #00e0c6;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate1 6s linear infinite;
        }

        .square span:nth-child(2) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#ff00c000 50%, #fd10e13b 40%);
            box-shadow: 0 0 50px #f317d9, inset 0 0 50px #f927e0;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate2 4s linear infinite;
        }

        .square span:nth-child(3) {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#00aaff06 50%, #00e1ff3b 40%);
            box-shadow: 0 0 50px #00ddff, inset 0 0 50px #00fbff;
            border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
            transition: 0.5s;
            animation: animate3 8s linear infinite;
        }

        @keyframes animate1 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes animate2 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes animate3 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Siri Wave Container - now in main content */
        #siri-container-main {
            width: 400px;
            max-width: 90vw;
            height: 60px;
            margin: 32px auto 0 auto;
            background: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .chat-sidebar {
                width: 100vw;
                min-width: 0;
                max-width: none;
                border-right: none;
                border-bottom: 2px solid #222;
                box-shadow: 0 2px 24px #000a;
                position: fixed;
                left: 0;
                top: 0;
                height: 60vh;
                z-index: 100;
            }

            .main-content {
                margin-top: 60vh;
            }

            #siri-container-main {
                width: 90vw;
            }
        }

        @media (max-width: 600px) {
            .chat-sidebar {
                width: 100vw;
                min-width: 0;
                max-width: none;
                border-right: none;
                border-bottom: 2px solid #222;
                box-shadow: 0 2px 24px #000a;

            }

            .square {
                width: 220px;
                height: 220px;
            }

            #siri-container-main {
                width: 95vw;
            }
        }
    </style>
</head>

    <!-- PARTICLE SPHERE SCRIPT (unchanged) -->
    <script>
        // Play audio only once per reload (on first load or first user interaction)
        let audioPlayed = false;
        function playChatAudioOnce() {
            if (!audioPlayed) {
                var audio = document.getElementById('chat-audio');

    <script>
        // Particle Sphere (from paste.txt)
        window.addEventListener("load", windowLoadHandler, false);
        var sphereRad = 140;
        var radius_sp = 1;
        var Debugger = function () { };
        Debugger.log = function (message) {
            try { console.log(message); } catch (exception) { return; }
        }
        function windowLoadHandler() {
            canvasApp();
        }
        function canvasSupport() {
            return Modernizr.canvas;
        }
        function canvasApp() {
            if (!canvasSupport()) return;
            var theCanvas = document.getElementById("canvasOne");
            var context = theCanvas.getContext("2d");
            var displayWidth, displayHeight, timer, wait, count, numToAddEachFrame;
            var particleList, recycleBin, particleAlpha, r, g, b, fLen, m, projCenterX, projCenterY, zMax, turnAngle, turnSpeed;
            var sphereCenterX, sphereCenterY, sphereCenterZ, particleRad, zeroAlphaDepth, randAccelX, randAccelY, randAccelZ, gravity, rgbString;
            var p, outsideTest, nextParticle, sinAngle, cosAngle, rotX, rotZ, depthAlphaFactor, i, theta, phi, x0, y0, z0;
            init();
            function init() {
                wait = 1;
                count = wait - 1;
                numToAddEachFrame = 8;
                r = 0; g = 72; b = 255;
                rgbString = "rgba(" + r + "," + g + "," + b + ",";
                particleAlpha = 1;
                displayWidth = theCanvas.width;
                displayHeight = theCanvas.height;
                fLen = 320;
                projCenterX = displayWidth / 2;
                projCenterY = displayHeight / 2;
                zMax = fLen - 2;
                particleList = {};
                recycleBin = {};
                randAccelX = 0.1;
                randAccelY = 0.1;
                randAccelZ = 0.1;
                gravity = -0;
                particleRad = 1.8;
                sphereCenterX = 0;
                sphereCenterY = 0;
                sphereCenterZ = -3 - sphereRad;
                zeroAlphaDepth = -750;
                turnSpeed = 2 * Math.PI / 1200;
                turnAngle = 0;
                timer = setInterval(onTimer, 10 / 24);
            }
            function onTimer() {
                count++;
                if (count >= wait) {
                    count = 0;
                    for (i = 0; i < numToAddEachFrame; i++) {
                        theta = Math.random() * 2 * Math.PI;
                        phi = Math.acos(Math.random() * 2 - 1);
                        x0 = sphereRad * Math.sin(phi) * Math.cos(theta);
                        y0 = sphereRad * Math.sin(phi) * Math.sin(theta);
                        z0 = sphereRad * Math.cos(phi);
                        var p = addParticle(x0, sphereCenterY + y0, sphereCenterZ + z0, 0.002 * x0, 0.002 * y0, 0.002 * z0);
                        p.attack = 50;
                        p.hold = 50;
                        p.decay = 100;
                        p.initValue = 0;
                        p.holdValue = particleAlpha;
                        p.lastValue = 0;
                        p.stuckTime = 90 + Math.random() * 20;
                        p.accelX = 0;
                        p.accelY = gravity;
                        p.accelZ = 0;
                    }
                }
                turnAngle = (turnAngle + turnSpeed) % (2 * Math.PI);
                sinAngle = Math.sin(turnAngle);
                cosAngle = Math.cos(turnAngle);
                context.fillStyle = "#000000";
                context.fillRect(0, 0, displayWidth, displayHeight);
                p = particleList.first;
                while (p != null) {
                    nextParticle = p.next;
                    p.age++;
                    if (p.age > p.stuckTime) {
                        p.velX += p.accelX + randAccelX * (Math.random() * 2 - 1);
                        p.velY += p.accelY + randAccelY * (Math.random() * 2 - 1);
                        p.velZ += p.accelZ + randAccelZ * (Math.random() * 2 - 1);
                        p.x += p.velX;
                        p.y += p.velY;
                        p.z += p.velZ;
                    }
                    rotX = cosAngle * p.x + sinAngle * (p.z - sphereCenterZ);
                    rotZ = -sinAngle * p.x + cosAngle * (p.z - sphereCenterZ) + sphereCenterZ;
                    m = radius_sp * fLen / (fLen - rotZ);
                    p.projX = rotX * m + projCenterX;
                    p.projY = p.y * m + projCenterY;
                    if (p.age < p.attack + p.hold + p.decay) {
                        if (p.age < p.attack) {
                            p.alpha = (p.holdValue - p.initValue) / p.attack * p.age + p.initValue;
                        }
                        else if (p.age < p.attack + p.hold) {
                            p.alpha = p.holdValue;
                        }
                        else if (p.age < p.attack + p.hold + p.decay) {
                            p.alpha = (p.lastValue - p.holdValue) / p.decay * (p.age - p.attack - p.hold) + p.holdValue;
                        }
                    }
                    else {
                        p.dead = true;
                    }
                    if ((p.projX > displayWidth) || (p.projX < 0) || (p.projY < 0) || (p.projY > displayHeight) || (rotZ > zMax)) {
                        outsideTest = true;
                    }
                    else {
                        outsideTest = false;
                    }
                    if (outsideTest || p.dead) {
                        recycle(p);
                    }
                    else {
                        depthAlphaFactor = (1 - rotZ / zeroAlphaDepth);
                        depthAlphaFactor = (depthAlphaFactor > 1) ? 1 : ((depthAlphaFactor < 0) ? 0 : depthAlphaFactor);
                        context.fillStyle = rgbString + depthAlphaFactor * p.alpha + ")";
                        context.beginPath();
                        context.arc(p.projX, p.projY, m * particleRad, 0, 2 * Math.PI, false);
                        context.closePath();
                        context.fill();
                    }
                    p = nextParticle;
                }
            }
            function addParticle(x0, y0, z0, vx0, vy0, vz0) {
                var newParticle;
                if (recycleBin.first != null) {
                    newParticle = recycleBin.first;
                    if (newParticle.next != null) {
                        recycleBin.first = newParticle.next;
                        newParticle.next.prev = null;
                    }
                    else {
                        recycleBin.first = null;
                    }
                }
                else {
                    newParticle = {};
                }
                if (particleList.first == null) {
                    particleList.first = newParticle;
                    newParticle.prev = null;
                    newParticle.next = null;
                }
                else {
                    newParticle.next = particleList.first;
                    particleList.first.prev = newParticle;
                    particleList.first = newParticle;
                    newParticle.prev = null;
                }
                newParticle.x = x0;
                newParticle.y = y0;
                newParticle.z = z0;
                newParticle.velX = vx0;
                newParticle.velY = vy0;
                newParticle.velZ = vz0;
                newParticle.age = 0;
                newParticle.dead = false;
                if (Math.random() < 0.5) {
                    newParticle.right = true;
                }
                else {
                    newParticle.right = false;
                }
                return newParticle;
            }
            function recycle(p) {
                if (particleList.first == p) {
                    if (p.next != null) {
                        p.next.prev = null;
                        particleList.first = p.next;
                    }
                    else {
                        particleList.first = null;
                    }
                }
                else {
                    if (p.next == null) {
                        p.prev.next = null;
                    }
                    else {
                        p.prev.next = p.next;
                        p.next.prev = p.prev;
                    }
                }
                if (recycleBin.first == null) {
                    recycleBin.first = p;
                    p.prev = null;
                    p.next = null;
                }
                else {
                    p.next = recycleBin.first;
                    recycleBin.first.prev = p;
                    recycleBin.first = p;
                    p.prev = null;
                }
            }
        }
    </script>

    <!-- Main JS for chat and UI logic with Gemini integration and SiriWave -->
    <script>
        // SiriWave instance for main content
        var siriWave = null;
        function showSiriWave() {
            var container = document.getElementById("siri-container-main");
            if (!siriWave) {
                siriWave = new SiriWave({
                    container: container,
                    width: container.offsetWidth || 340,
                    height: 60,
                    style: "ios9",
                    amplitude: 2,
                    speed: 0.15,
                    color: "#00e0c6"
                });
            }
            container.style.display = "flex";
            siriWave.start();
        }
        function hideSiriWave() {
            if (siriWave) {
                siriWave.stop();
            }
            document.getElementById("siri-container-main").style.display = "none";
        }

        // Function to send prompt to Groq and handle response
        async function sendToGroq(prompt) {
            let apiKey = "";
            try {
                const configRes = await fetch("http://localhost:3000/api/config");
                const config = await configRes.json();
                apiKey = config.GROQ_API_KEY;
            } catch (err) {
                console.error("Failed to load Groq API key from backend:", err);
            }
            const url = "https://api.groq.com/openai/v1/chat/completions";

            // Remove last Bot placeholder if exists
            $('#chatDisplay .bot-msg').last().parent().remove();
            // Add loading placeholder
            appendMessage("...", 'bot');
            showSiriWave();

            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are RIA, a helpful, witty, and advanced AI voice assistant. Keep your responses concise and conversational." },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7,
                        max_tokens: 1024
                    })
                });

                const data = await res.json();

                // Remove the placeholder
                $('#chatDisplay .bot-msg').last().parent().remove();
                hideSiriWave();

                if (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                    appendMessage(data.choices[0].message.content, 'bot');
                } else {
                    console.error("Groq API Error:", data);
                    appendMessage("I'm having trouble connecting to my brain right now.", 'bot');
                }
            } catch (err) {
                $('#chatDisplay .bot-msg').last().parent().remove();
                hideSiriWave();
                console.error(err);
                appendMessage("Error: " + err.message, 'bot');
            }
        }

        // Function to append user or bot message to chat display
        function appendMessage(text, sender) {
            let row = $('<div class="message-row"></div>');
            if (sender === 'user') {
                row.append('<div class="user-msg">' + $('<div>').text(text).html() + '</div>');
            } else {
                row.append('<div class="bot-msg">' + $('<div>').text(text).html() + '</div>');
            }
            $('#chatDisplay').append(row);
            $('#chatDisplay').scrollTop($('#chatDisplay')[0].scrollHeight);
        }

        // Toggle mic/send button based on input
        function ShowHideButton(message) {
            if (message.length === 0) {
                $("#MicBtn").attr('hidden', false);
                $("#SendBtn").attr('hidden', true);
            } else {
                $("#MicBtn").attr('hidden', true);
                $("#SendBtn").attr('hidden', false);
            }
        }

        // Handle sending user input to Gemini
        function handleSend() {
            let message = $("#chatbox").val().trim();
            if (message.length === 0) return;
            appendMessage(message, 'user');
            $("#chatbox").val("");
            ShowHideButton("");
            appendMessage("...", 'bot'); // Placeholder while waiting
            showSiriWave();
            sendToGroq(message);
        }

        // jQuery document ready
        $(document).ready(function () {
            // Input events
            $("#chatbox").keyup(function () {
                let message = $("#chatbox").val();
                ShowHideButton(message);
            });

            // Send button click
            $("#SendBtn").click(function () {
                handleSend();
            });

            // Enter key in chatbox
            $("#chatbox").keypress(function (e) {
                if (e.which === 13) {
                    handleSend();
                }
            });

            // Mic button click
            $("#MicBtn").click(function () {
                window.location.href = "talk_with_bot.html";
            });

            // Initial button state
            ShowHideButton($("#chatbox").val());

            // Focus chatbox on load
            $("#chatbox").focus();

            // Responsive SiriWave width
            function resizeSiriWave() {
                if (siriWave) {
                    siriWave.setWidth(document.getElementById("siri-container-main").offsetWidth || 340);
                }
            }
            window.addEventListener('resize', resizeSiriWave);
        });
    </script>
</body>

</html>
